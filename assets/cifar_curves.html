<script>
(function(){
  function gd(){return document.querySelector('.plotly-graph-div');}
  function apply(t){
    var dark=(t==='dark');
    document.documentElement.setAttribute('data-theme',t);
    try{document.body.style.background = dark ? '#1a1a22' : '#ffffff';}catch(e){}
    (function go(){
      var g=gd();
      if(g && window.Plotly && g.layout){
        Plotly.relayout(g,{
          'paper_bgcolor':'rgba(0,0,0,0)','plot_bgcolor':'rgba(0,0,0,0)',
          'font.color':dark?'#c6c6d2':'#33333c',
          'title.font.color':dark?'#dadae3':'#1a1a1f',
          'legend.font.color':dark?'#c6c6d2':'#33333c','legend.bgcolor':'rgba(0,0,0,0)',
          'xaxis.gridcolor':dark?'rgba(255,255,255,.09)':'rgba(0,0,0,.09)',
          'yaxis.gridcolor':dark?'rgba(255,255,255,.09)':'rgba(0,0,0,.09)',
          'xaxis.zerolinecolor':dark?'rgba(255,255,255,.16)':'rgba(0,0,0,.16)',
          'yaxis.zerolinecolor':dark?'rgba(255,255,255,.16)':'rgba(0,0,0,.16)',
          'xaxis.linecolor':dark?'rgba(255,255,255,.22)':'rgba(0,0,0,.2)',
          'yaxis.linecolor':dark?'rgba(255,255,255,.22)':'rgba(0,0,0,.2)'
        });
      } else { setTimeout(go,150); }
    })();
  }
  window.addEventListener('message',function(e){ if(e.data&&e.data.theme) apply(e.data.theme); });
  var h=(location.hash||'').replace('#',''); apply(h==='light'?'light':'dark');
})();
</script>
